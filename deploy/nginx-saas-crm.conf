# ============================================================
# Nginx reverse proxy pour SaaS CRM Backend
# A ajouter dans Plesk: Domaines > crm-api.lescommunicateurs.ca
# > Parametres Apache & nginx > Directives nginx additionnelles
# ============================================================

# Ou creer un sous-domaine crm-api.lescommunicateurs.ca dans Plesk
# et ajouter ces directives:

location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (Socket.io)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts pour les requetes IA longues
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

version: '3.8'

services:
  # ── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: saas-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: saas_dev
      POSTGRES_PASSWORD: saas_dev_password
      POSTGRES_DB: saas_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_dev -d saas_crm"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend Node.js (dev watch) ──────────────────────
  backend:
    image: node:20-alpine
    container_name: saas-crm-backend
    working_dir: /app
    command: npx nodemon --watch src src/index.js
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      # PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: saas_dev
      DB_PASSWORD: saas_dev_password
      DB_NAME: saas_crm
      # JWT
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      # Encryption (cles API CRM)
      ENCRYPTION_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      # Ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3:8b-instruct-q4_K_M
      # ElevenLabs (configurer dans .env)
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Ollama (IA locale) ──────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: saas-crm-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU: decommenter si NVIDIA GPU disponible
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  pgdata:
    name: saas-crm-pgdata
  backend_node_modules:
    name: saas-crm-backend-modules
  ollama_data:
    name: saas-crm-ollama-data
